# MaxxFan Dashboard Card - Requires custom:button-card from HACS
# Copy this into your Home Assistant dashboard YAML or use the UI editor.

type: vertical-stack
cards:
  # Offline indicator
  - type: conditional
    conditions:
      - condition: state
        entity: binary_sensor.maxxfan_status
        state: "off"
    card:
      type: tile
      entity: binary_sensor.maxxfan_status
      name: MaxxFan
      icon: mdi:wifi-off
      color: red

  # Main controls (shown when online)
  - type: conditional
    conditions:
      - condition: state
        entity: binary_sensor.maxxfan_status
        state: "on"
    card:
      type: vertical-stack
      title: MaxxFan
      cards:
        # Fan tile with power toggle and speed slider
        - type: tile
          entity: fan.maxxfan_fan
          name: Ventilator
          icon: mdi:fan
          features:
            - type: fan-speed

        # Direction and Cover controls
        - type: horizontal-stack
          cards:
            - type: custom:button-card
              entity: switch.maxxfan_direction
              name: >
                [[[ return entity.state === 'on' ? 'Luft raus' : 'Luft rein' ]]]
              show_state: false
              show_label: false
              show_name: true
              show_icon: true
              icon: mdi:chevron-double-down
              state:
                - value: "on"
                  icon: mdi:chevron-double-up
                  styles:
                    icon:
                      - color: rgb(68, 115, 158)
                    img_cell:
                      - background-color: rgba(68, 115, 158, 0.2)
                    state:
                      - color: rgb(68, 115, 158)
                - value: "off"
                  icon: mdi:chevron-double-down
                  styles:
                    icon:
                      - color: rgb(120, 120, 120)
                    img_cell:
                      - background-color: rgba(120, 120, 120, 0.1)
                    state:
                      - color: rgb(120, 120, 120)
              tap_action:
                action: toggle
              styles:
                card:
                  - height: 60px
                  - padding: 7px
                grid:
                  - grid-template-areas: '"i n"'
                  - grid-template-columns: 48px 1fr
                  - grid-template-rows: 1fr
                img_cell:
                  - border-radius: 60%
                  - width: 38px
                  - height: 38px
                  - display: flex
                  - align-items: center
                  - justify-content: center
                icon:
                  - width: 23px
                  - height: 28px
                name:
                  - justify-self: start
                  - align-self: center
                  - font-size: 14px
                  - font-weight: 500
            - type: custom:button-card
              entity: switch.maxxfan_cover
              name: >
                [[[ return entity.state === 'on' ? 'Cover offen' : 'Cover geschlossen' ]]]
              show_state: false
              show_label: false
              show_name: true
              show_icon: true
              icon: mdi:window-closed
              state:
                - value: "on"
                  icon: mdi:window-open
                  styles:
                    icon:
                      - color: rgb(234, 179, 8)
                    img_cell:
                      - background-color: rgba(234, 179, 8, 0.2)
                - value: "off"
                  icon: mdi:window-closed
                  styles:
                    icon:
                      - color: rgb(120, 120, 120)
                    img_cell:
                      - background-color: rgba(120, 120, 120, 0.1)
              tap_action:
                action: toggle
              styles:
                card:
                  - height: 60px
                  - padding: 7px
                grid:
                  - grid-template-areas: '"i n"'
                  - grid-template-columns: 48px 1fr
                  - grid-template-rows: 1fr
                img_cell:
                  - border-radius: 60%
                  - width: 38px
                  - height: 38px
                  - display: flex
                  - align-items: center
                  - justify-content: center
                icon:
                  - width: 23px
                  - height: 28px
                name:
                  - justify-self: start
                  - align-self: center
                  - font-size: 14px
                  - font-weight: 500

        # Climate sensors
        - type: horizontal-stack
          cards:
            - type: tile
              entity: sensor.maxxfan_temperature
              name: Temperature
              icon: mdi:thermometer
              color: orange
            - type: tile
              entity: sensor.maxxfan_humidity
              name: Humidity
              icon: mdi:water-percent
              color: cyan

        # Rain sensor
        - type: tile
          entity: sensor.maxxfan_rain_intensity
          name: Rain
          icon: mdi:weather-rainy
          color: blue

        # Restart
        - type: tile
          entity: button.maxxfan_restart
          name: Restart
          icon: mdi:restart
          color: red
          tap_action:
            action: call-service
            service: button.press
            target:
              entity_id: button.maxxfan_restart
