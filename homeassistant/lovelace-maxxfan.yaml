# MaxxFan Dashboard Card - Built-in HA cards only (no HACS required)
# Copy this into your Home Assistant dashboard YAML or use the UI editor.

type: vertical-stack
cards:
  # Offline indicator
  - type: conditional
    conditions:
      - condition: state
        entity: binary_sensor.maxxfan_status
        state: "off"
    card:
      type: tile
      entity: binary_sensor.maxxfan_status
      name: MaxxFan
      icon: mdi:wifi-off
      color: red

  # Main controls (shown when online)
  - type: conditional
    conditions:
      - condition: state
        entity: binary_sensor.maxxfan_status
        state: "on"
    card:
      type: vertical-stack
      title: MaxxFan
      cards:
        # Fan tile with power toggle and speed slider
        - type: tile
          entity: fan.maxxfan_fan
          name: Fan
          icon: mdi:fan
          features:
            - type: fan-speed

        # Direction and Cover controls
        - type: horizontal-stack
          cards:
            - type: tile
              entity: switch.maxxfan_direction
              name: Direction
              icon: mdi:rotate-left
              color: blue
              tap_action:
                action: toggle
            - type: tile
              entity: switch.maxxfan_cover
              name: Cover
              icon: mdi:arrow-up-bold
              color: amber
              tap_action:
                action: toggle

        # Climate sensors
        - type: horizontal-stack
          cards:
            - type: tile
              entity: sensor.maxxfan_temperature
              name: Temperature
              icon: mdi:thermometer
              color: orange
            - type: tile
              entity: sensor.maxxfan_humidity
              name: Humidity
              icon: mdi:water-percent
              color: cyan

        # Rain sensor
        - type: tile
          entity: sensor.maxxfan_rain_intensity
          name: Rain
          icon: mdi:weather-rainy
          color: blue

        # Restart
        - type: tile
          entity: button.maxxfan_restart
          name: Restart
          icon: mdi:restart
          color: red
          tap_action:
            action: call-service
            service: button.press
            target:
              entity_id: button.maxxfan_restart
